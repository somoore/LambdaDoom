version: 2
updates:
  # GitHub Actions are SHA-pinned (see scripts/check-action-pins.sh). Dependabot
  # opens reviewable PRs that bump the SHA and the trailing `# vX` comment together,
  # so pin updates get the same review as any other security-sensitive change.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
    groups:
      # One PR per week for routine action bumps instead of one per action.
      actions:
        patterns:
          - "*"

  # Rust crates. Convenience bumps — RUSTSEC advisories are already gated by
  # cargo-deny (ci.yml rust-deny job). Cargo.lock keeps the hashes.
  - package-ecosystem: cargo
    directory: /rs-cli
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - rust
    groups:
      cargo:
        patterns:
          - "*"

  # Python wheels for the capsule. Bumps are validated by scripts/check-reqs.sh
  # (hash-pinned, cp311/aarch64) in the capsule CI job.
  - package-ecosystem: pip
    directory: /capsule
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - python
    groups:
      pip:
        patterns:
          - "*"
